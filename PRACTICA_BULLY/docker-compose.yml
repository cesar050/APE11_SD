services:
  peer1:
    build: .
    container_name: bully-peer1
    command: --id 1 ${B1:-}
    env_file: peers.env
    ports:
      - "9000:9000/udp"
    depends_on:
      - peer2

  peer2:
    build: .
    container_name: bully-peer2
    command: --id 2 ${B2:-}
    env_file: peers.env
    ports:
      - "9001:9000/udp"

networks:
  default:
    driver: bridge
